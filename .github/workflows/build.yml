name: Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Fix permissions (IMPORTANT)
      run: |
        git config --global --add safe.directory /github/workspace
        chown -R 1000:1000 .

    - name: Build APK
      run: |
        su buildozer -c "buildozer -v android debug"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
