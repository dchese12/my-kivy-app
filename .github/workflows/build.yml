name: Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
        python3-pip python3-setuptools python3-wheel \
        autoconf automake libtool pkg-config cmake

    - name: Install Buildozer (stable version)
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython

    - name: FULL CLEAN (important)
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer

    - name: Build APK (let Buildozer manage Android SDK itself)
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"
