name: Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
    - uses: actions/checkout@v4

    - name: Fix permissions (avoid root prompt)
      run: |
        useradd -m builder
        chown -R builder:builder $GITHUB_WORKSPACE

    - name: Build APK (run as non-root)
      run: |
        su builder -c "buildozer android debug"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
