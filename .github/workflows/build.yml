name: Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip

        pip install --upgrade pip
        pip install buildozer cython

    - name: FORCE correct Android environment
      run: |
        mkdir -p ~/.buildozer

        # Force Buildozer to NOT use SDK 37
        echo "[app]" > buildozer.spec
        echo "title = My Kivy App" >> buildozer.spec
        echo "package.name = myapp" >> buildozer.spec
        echo "package.domain = org.test" >> buildozer.spec
        echo "source.dir = ." >> buildozer.spec
        echo "requirements = python3,kivy" >> buildozer.spec
        echo "version = 0.1" >> buildozer.spec

    - name: Build APK (clean build)
      run: |
        export BUILDOZER_WARN_ON_ROOT=0

        # FORCE reinstall clean environment
        buildozer android clean
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"
