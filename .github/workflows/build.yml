name: Build APK (Docker)

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
    - uses: actions/checkout@v4

    - name: Clean previous builds
      run: |
        rm -rf .buildozer
        rm -rf bin

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
